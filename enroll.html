<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll With Us | Damuku Kids School</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="container header-container">
        <div class="logo">
            <img src="logo.png" alt="School Logo">
            <h1>Damuku Kids School</h1>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="enroll.html">Enroll</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- HERO -->
<section class="hero enroll-hero">
    <div class="hero-content">
        <h2>Enroll With Us</h2>
        <p>Give your child a bright future today</p>
    </div>
</section>

<!-- FORM SECTION -->
<section class="section">
    <div class="container">
        <h2>Online Application Form</h2>

        <form class="enroll-form">
            <div class="form-group">
                <label>Child Full Name</label>
                <input type="text" placeholder="Enter child's name" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>

            <div class="form-group">
                <label>Grade Applying For</label>
                <select required>
                    <option>-- Select Grade --</option>
                    <option>Baby Class</option>
                    <option>Middle Class</option>
                    <option>Reception</option>
                    <option>Grade 1</option>
                    <option>Grade 2</option>
                    <option>Grade 3</option>
                    <option>Grade 4</option>
                    <option>Grade 5</option>
                    <option>Grade 6</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parent/Guardian Name</label>
                <input type="text" placeholder="Enter parent name" required>
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" placeholder="0973 555146" required>
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter email" required>
            </div>

            <div class="form-group">
                <label>Home Address</label>
                <textarea rows="4" placeholder="Enter address"></textarea>
            </div>

            <div class="form-group">
                <label>Additional Notes</label>
                <textarea rows="4" placeholder="Any additional information"></textarea>
            </div>

            <button type="submit" class="btn">Submit Application</button>
        </form>
    </div>
</section>

<!-- CONTACT -->
<section class="section contact">
    <div class="container">
        <h2>Need Help?</h2>
        <p><strong>Phone:</strong> 0973 555146</p>
        <p><strong>Email:</strong> damukukidsschool2021@gmail.com</p>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Damuku Kids School | All Rights Reserved</p>
</footer>

</body>
</html>
